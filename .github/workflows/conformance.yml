name: Conformance

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 8 * * 1,4'  # Mon/Thu 8 AM UTC
  workflow_dispatch:

jobs:
  conformance:
    name: Run OMS conformance suite
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build model-signing binary
        run: make build

      - name: Build Go conformance adapter
        run: go build -o test/conformance/go-conformance ./test/conformance/

      - uses: sampras343/model-signing-conformance@main
        with:
          entrypoint: ${{ github.workspace }}/test/conformance/go-conformance
          xfail: |
            test_verify[negative/key-simple-wrong-mediatype_fail]
            test_roundtrip[key-p521]
        env:
          MODEL_SIGNING_BIN: ${{ github.workspace }}/build/model-signing
