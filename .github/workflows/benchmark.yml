name: Benchmark

on:
  push:
    branches: [benchmarks]
  schedule:
    - cron: '0 1 * * 1'  # Weekly on Monday at 1 AM UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  benchmark:
    name: Run OMS benchmarks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Go conformance adapter
        run: go build -o test/conformance/go-conformance ./test/conformance/

      - name: Run OMS benchmark harness
        uses: sampras343/model-signing-conformance/benchmark-action@benchmarks
        with:
          entrypoint:  ${{ github.workspace }}/test/conformance/go-conformance
          private-key: ${{ github.workspace }}/_conformance/test/assets/keys/p384/signing-key.pem
          public-key:  ${{ github.workspace }}/_conformance/test/assets/keys/p384/signing-key-pub.pem
          ci:          'true'
          output:      benchmark-results.json
